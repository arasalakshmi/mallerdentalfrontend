<app-page-hero
  [image]="blog.hero.image"
  [title]="blog.hero.title"
  [subtitle]="blog.hero.subtitle"
  [description]="blog.hero.description">
</app-page-hero>
<section class="blog-section">

  <div class="container">

    <!-- Section Heading -->
    <div class="section-header text-center">

      <span class="section-tag">
        Dental Knowledge Hub
      </span>

      <h2>
        Latest Dental Articles
      </h2>

      <p>
        Explore expert advice, treatment guides, and oral health tips from our experienced dental team.
      </p>

    </div>

    <!-- Blog Cards -->
    <div class="row g-4">

      <div
        class="col-lg-4 col-md-6"
        *ngFor="let blog of blogs">

        <div class="blog-card">

          <!-- Image -->
          <div class="blog-image">

            <img
              [src]="imageService.url(blog.mainImage)"
              [alt]="blog.title">

          </div>

          <!-- Content -->
          <div class="blog-content">

            <div class="blog-meta">

              <span>
                <i class="bi bi-calendar3"></i>
                {{ blog.publishedAt | date }}
              </span>

              <span *ngIf="blog.author">
                <i class="bi bi-person"></i>
                {{ blog.author.name }}
              </span>

            </div>

            <h3>
              {{ blog.title }}
            </h3>

            <p>
              {{ blog.excerpt }}
            </p>

            <a
              class="read-more"
              [routerLink]="['/blog',  blog.slug.current]">

              Read Article

              <i class="bi bi-arrow-right"></i>

            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
