<section class="page-hero">

  <div class="container">

    <!-- Breadcrumb -->
    <nav
      class="breadcrumb-nav"
      *ngIf="hero.breadcrumbs?.length">

      <ng-container *ngFor="let item of hero.breadcrumbs; let last = last">

        <a
          *ngIf="item.link && !last"
          [routerLink]="item.link">

          {{item.label}}

        </a>

        <span
          *ngIf="!item.link || last">

          {{item.label}}

        </span>

        <i
          class="bi bi-chevron-right"
          *ngIf="!last">

        </i>

      </ng-container>

    </nav>


    <div class="row align-items-center gy-5">

      <!-- Left -->

      <div class="col-lg-6">

        <span
          class="hero-subtitle"
          *ngIf="hero.subtitle">

          {{hero.subtitle}}

        </span>

        <h1>

          {{hero.title}}

        </h1>

        <p
          *ngIf="hero.description">

          {{hero.description}}

        </p>


        <div
          class="hero-buttons">

          <a
            *ngIf="hero.primaryButton"
            [routerLink]="hero.primaryButton.link"
            class="btn btn-primary">

            {{hero.primaryButton.text}}

          </a>

          <a
            *ngIf="hero.secondaryButton"
            [routerLink]="hero.secondaryButton.link"
            class="btn btn-outline-primary">

            {{hero.secondaryButton.text}}

          </a>

        </div>


        <div
          class="hero-badges"
          *ngIf="hero.badges?.length">

          <div
            class="badge-card"
            *ngFor="let badge of hero.badges">

            <i [class]="badge.icon"></i>

            <span>

              {{badge.title}}

            </span>

          </div>

        </div>

      </div>


      <!-- Right -->

      <div class="col-lg-6 text-center">

        <img
          [src]="hero.image"
          [alt]="hero.title"
          class="hero-image">

      </div>

    </div>

  </div>

</section>
